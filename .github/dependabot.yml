version: 2
updates:
  # npm dependencies (root package.json)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    labels:
      - 'dependencies'
    groups:
      npm-minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions used in workflows (kept SHA-pinned; Dependabot bumps the pin + comment)
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - 'dependencies'
      - 'github-actions'
    groups:
      actions-minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
